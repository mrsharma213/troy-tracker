(function(){
  function sha256(s){
    function rr(n,x){return(n>>>x)|(n<<(32-x));}
    var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
    var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    var b=[];for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);if(c<128)b.push(c);else if(c<2048){b.push(192|(c>>6));b.push(128|(c&63));}else{b.push(224|(c>>12));b.push(128|((c>>6)&63));b.push(128|(c&63));}}
    var l=b.length*8;b.push(0x80);while(b.length%64!==56)b.push(0);
    b.push(0,0,0,0);b.push((l>>>24)&0xff,(l>>>16)&0xff,(l>>>8)&0xff,l&0xff);
    for(var o=0;o<b.length;o+=64){
      var w=[];for(var t=0;t<16;t++)w[t]=(b[o+t*4]<<24)|(b[o+t*4+1]<<16)|(b[o+t*4+2]<<8)|b[o+t*4+3];
      for(t=16;t<64;t++){var s0=rr(w[t-15],7)^rr(w[t-15],18)^(w[t-15]>>>3);var s1=rr(w[t-2],17)^rr(w[t-2],19)^(w[t-2]>>>10);w[t]=(w[t-16]+s0+w[t-7]+s1)|0;}
      var a=H[0],bb=H[1],cc=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
      for(t=0;t<64;t++){var S1=rr(e,6)^rr(e,11)^rr(e,25);var ch=(e&f)^((~e)&g);var temp1=(h+S1+ch+K[t]+w[t])|0;var S0=rr(a,2)^rr(a,13)^rr(a,22);var maj=(a&bb)^(a&cc)^(bb&cc);var temp2=(S0+maj)|0;h=g;g=f;f=e;e=(d+temp1)|0;d=cc;cc=bb;bb=a;a=(temp1+temp2)|0;}
      H[0]=(H[0]+a)|0;H[1]=(H[1]+bb)|0;H[2]=(H[2]+cc)|0;H[3]=(H[3]+d)|0;H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
    }
    return H.map(function(v){return('00000000'+((v<0?v+4294967296:v).toString(16))).slice(-8);}).join('');
  }

  var ph='d6a69166d21ee0c8a97327cb142adee2201749599f194a27453fc23edc0cde07';
  if(sessionStorage.getItem('cc_auth')==='1')return;

  document.addEventListener('DOMContentLoaded',function(){
    document.body.innerHTML='';
    document.body.style.cssText='background:#0a0a0b;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:Inter,-apple-system,sans-serif;overflow:hidden;';

    var d=document.createElement('div');
    d.style.cssText='text-align:center;user-select:none;-webkit-user-select:none;';
    d.innerHTML='<div style="font-size:48px;margin-bottom:24px">⚡</div><h1 style="color:#ededef;font-size:22px;margin-bottom:32px;font-weight:600">Nik × Troy</h1><canvas id="patternCanvas" width="240" height="240" style="display:block;margin:0 auto;cursor:pointer;touch-action:none;"></canvas><p id="lockHint" style="color:#5c5c63;font-size:13px;margin-top:16px;">Draw pattern to unlock</p><p id="err" style="color:#ef4444;font-size:13px;margin-top:8px;opacity:0;transition:opacity 0.3s">Wrong pattern</p>';
    document.body.appendChild(d);

    var canvas = document.getElementById('patternCanvas');
    var ctx = canvas.getContext('2d');
    var err = document.getElementById('err');
    var hint = document.getElementById('lockHint');

    // Dot positions (3x3 grid)
    var dotRadius = 12;
    var activeRadius = 16;
    var padding = 40;
    var spacing = (240 - padding * 2) / 2;
    var dots = [];
    for (var row = 0; row < 3; row++) {
      for (var col = 0; col < 3; col++) {
        dots.push({
          id: row * 3 + col + 1,
          x: padding + col * spacing,
          y: padding + row * spacing,
          selected: false
        });
      }
    }

    var selectedDots = [];
    var isDrawing = false;
    var currentX = 0, currentY = 0;
    var wrongFlash = false;

    function drawPattern() {
      ctx.clearRect(0, 0, 240, 240);

      // Draw lines between selected dots
      if (selectedDots.length > 1) {
        ctx.beginPath();
        ctx.strokeStyle = wrongFlash ? '#ef4444' : '#6c5ce7';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.moveTo(dots[selectedDots[0] - 1].x, dots[selectedDots[0] - 1].y);
        for (var i = 1; i < selectedDots.length; i++) {
          ctx.lineTo(dots[selectedDots[i] - 1].x, dots[selectedDots[i] - 1].y);
        }
        ctx.stroke();
      }

      // Draw line to current touch/mouse position
      if (isDrawing && selectedDots.length > 0) {
        ctx.beginPath();
        ctx.strokeStyle = wrongFlash ? '#ef4444' : 'rgba(108,92,231,0.5)';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        var last = dots[selectedDots[selectedDots.length - 1] - 1];
        ctx.moveTo(last.x, last.y);
        ctx.lineTo(currentX, currentY);
        ctx.stroke();
      }

      // Draw dots
      for (var j = 0; j < dots.length; j++) {
        var dot = dots[j];
        var isSelected = selectedDots.indexOf(dot.id) !== -1;

        // Outer ring
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, isSelected ? activeRadius : dotRadius, 0, Math.PI * 2);
        if (wrongFlash) {
          ctx.fillStyle = isSelected ? 'rgba(239,68,68,0.2)' : 'rgba(239,68,68,0.08)';
        } else {
          ctx.fillStyle = isSelected ? 'rgba(108,92,231,0.2)' : 'rgba(255,255,255,0.05)';
        }
        ctx.fill();

        // Inner dot
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, isSelected ? 6 : 4, 0, Math.PI * 2);
        if (wrongFlash) {
          ctx.fillStyle = isSelected ? '#ef4444' : '#5c5c63';
        } else {
          ctx.fillStyle = isSelected ? '#6c5ce7' : '#5c5c63';
        }
        ctx.fill();
      }
    }

    function getCanvasPos(e) {
      var rect = canvas.getBoundingClientRect();
      var scaleX = 240 / rect.width;
      var scaleY = 240 / rect.height;
      var clientX, clientY;
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function hitTest(x, y) {
      for (var i = 0; i < dots.length; i++) {
        var dx = x - dots[i].x;
        var dy = y - dots[i].y;
        if (Math.sqrt(dx * dx + dy * dy) < 28) {
          return dots[i].id;
        }
      }
      return null;
    }

    function onStart(e) {
      e.preventDefault();
      if (wrongFlash) return;
      isDrawing = true;
      selectedDots = [];
      err.style.opacity = '0';
      var pos = getCanvasPos(e);
      currentX = pos.x;
      currentY = pos.y;
      var hit = hitTest(pos.x, pos.y);
      if (hit) selectedDots.push(hit);
      drawPattern();
    }

    function onMove(e) {
      e.preventDefault();
      if (!isDrawing) return;
      var pos = getCanvasPos(e);
      currentX = pos.x;
      currentY = pos.y;
      var hit = hitTest(pos.x, pos.y);
      if (hit && selectedDots.indexOf(hit) === -1) {
        selectedDots.push(hit);
      }
      drawPattern();
    }

    function onEnd(e) {
      e.preventDefault();
      if (!isDrawing) return;
      isDrawing = false;
      if (selectedDots.length < 2) {
        selectedDots = [];
        drawPattern();
        return;
      }
      var pattern = selectedDots.join('-');
      var hash = sha256(pattern);
      if (hash === ph) {
        sessionStorage.setItem('cc_auth', '1');
        location.reload();
      } else {
        wrongFlash = true;
        err.style.opacity = '1';
        drawPattern();
        setTimeout(function() {
          wrongFlash = false;
          selectedDots = [];
          err.style.opacity = '0';
          drawPattern();
        }, 600);
      }
    }

    // Mouse events
    canvas.addEventListener('mousedown', onStart);
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseup', onEnd);
    canvas.addEventListener('mouseleave', onEnd);

    // Touch events
    canvas.addEventListener('touchstart', onStart, { passive: false });
    canvas.addEventListener('touchmove', onMove, { passive: false });
    canvas.addEventListener('touchend', onEnd, { passive: false });
    canvas.addEventListener('touchcancel', onEnd, { passive: false });

    drawPattern();
  });
})();
</script>

<style>

  :root {

    --paused-bg: rgba(107, 114, 128, 0.1);

    --closed-bg: rgba(239, 68, 68, 0.1);

    --alert-bg: rgba(244, 63, 94, 0.08);
    --alert-border: rgba(244, 63, 94, 0.25);

  }

  body {

    background: var(--bg);
    color: var(--text);

    -moz-osx-font-smoothing: grayscale;

  .container {
    max-width: 1080px;
    margin: 0 auto;

  }

  /* Header */
  header {
    padding: 48px 0 0;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .bolt {
    font-size: 24px;

  .project-count {

    padding: 4px 12px;
  }

  /* Search & Filters */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;

    flex-wrap: wrap;
  }

  .search-wrapper {
    position: relative;

    min-width: 200px;
    max-width: 360px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    font-size: 14px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input::placeholder { color: var(--text-tertiary); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
  }

  .filter-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    user-select: none;
  }

  .pill:hover {
    border-color: var(--text-tertiary);
    color: var(--text);
  }

  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;

  .grid {

    gap: 1px;
    margin-top: 28px;

    border: 1px solid var(--border);
    border-radius: var(--radius);

    padding: 18px 22px;

  .activity-text {

  .alert-badge {
    display: inline-flex;

    gap: 5px;
    margin-top: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--alert);
    background: rgba(244, 63, 94, 0.1);
    border: 1px solid var(--alert-border);
    border-radius: var(--radius-sm);

  .alert-icon { font-size: 12px; }

  .card-meta {
    text-align: right;
    white-space: nowrap;
    padding-top: 2px;
  }

  .card-date {
    font-size: 12px;
    color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
  }

  /* Empty State */
  .empty {
    text-align: center;
    padding: 64px 24px;
    color: var(--text-tertiary);
    font-size: 14px;
    background: var(--surface);

  /* Footer */
  footer {

  .footer-text {

  /* Responsive */
  @media (max-width: 640px) {

    .search-wrapper { max-width: none; }
    .filter-pills { justify-content: flex-start; }
    .card { grid-template-columns: 1fr; gap: 10px; padding: 16px 18px; }

  }

  /* Fade-in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    animation: fadeUp 0.3s ease both;
  }
</style>
</head>

const statusPriority = { active: 1, waiting: 2, paused: 3, closed: 4 };

function sortProjects(list) {
  return [...list].sort((a, b) => {
    const aHas = a.alert ? 0 : 1;
    const bHas = b.alert ? 0 : 1;
    if (aHas !== bHas) return aHas - bHas;
    const aPri = statusPriority[a.status] || 5;
    const bPri = statusPriority[b.status] || 5;
    if (aPri !== bPri) return aPri - bPri;
    return a.name.localeCompare(b.name);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard(p, i) {
  const hasAlert = p.alert ? 'has-alert' : '';
  const date = new Date(p.updated + 'T00:00:00');
  const formatted = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const alertHtml = p.alert
    ? `<div class="alert-badge"><span class="alert-icon">\u26A0</span> ${escapeHtml(p.alert)}</div>`
    : '';

  let statusLineHtml = '';
  if (p.currentStatus) {
    statusLineHtml = `<div class="card-status-line"><span class="card-status-dot"></span>${escapeHtml(p.currentStatus)}</div>`;
  }

  let activityHtml = '';
  if (p.recentActivity && p.recentActivity.length > 0) {
    const items = p.recentActivity.map(a =>
      `<div class="card-activity-item"><span class="activity-date">${escapeHtml(a.date)}</span><span class="activity-text">${escapeHtml(a.text)}</span></div>`
    ).join('');
    activityHtml = `<div class="card-activity">${items}</div>`;
  }

  return `
    <div class="card ${hasAlert}" style="animation-delay: ${i * 30}ms">
      <div class="card-main">
        <div class="card-header">
          <span class="card-name">${escapeHtml(p.name)}</span>
          <span class="status-tag status-${p.status}"><span class="status-dot"></span>${p.status}</span>
        </div>
        <div class="card-desc">${escapeHtml(p.desc)}</div>
        ${statusLineHtml}
        ${activityHtml}
        ${alertHtml}
      </div>
      <div class="card-meta">
        <span class="card-date">${formatted}</span>
      </div>
    </div>`;
}

let currentFilter = 'all';
let searchQuery = '';

function render() {
  let filtered = projects;

  if (currentFilter !== 'all') {
    filtered = filtered.filter(p => p.status === currentFilter);
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      p.status.toLowerCase().includes(q) ||
      (p.alert && p.alert.toLowerCase().includes(q)) ||
      (p.currentStatus && p.currentStatus.toLowerCase().includes(q)) ||
      (p.recentActivity && p.recentActivity.some(a => a.text.toLowerCase().includes(q)))
    );
  }

  const sorted = sortProjects(filtered);
  const grid = document.getElementById('grid');

  if (sorted.length === 0) {
    grid.innerHTML = '<div class="empty">No projects match your filters.</div>';
  } else {
    grid.innerHTML = sorted.map((p, i) => renderCard(p, i)).join('');
  }

  document.getElementById('count').textContent = `${sorted.length} of ${projects.length} projects`;
}

// Filters
document.getElementById('filters').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  currentFilter = pill.dataset.filter;
  render();
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// Timestamp
const now = new Date();
document.getElementById('timestamp').textContent = now.toLocaleDateString('en-US', {
  weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
  hour: 'numeric', minute: '2-digit', hour12: true
});

// Initial render
render();
