<script>
(function(){
  function sha256(s){
    function rr(n,x){return(n>>>x)|(n<<(32-x));}
    var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
    var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    var b=[];for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);if(c<128)b.push(c);else if(c<2048){b.push(192|(c>>6));b.push(128|(c&63));}else{b.push(224|(c>>12));b.push(128|((c>>6)&63));b.push(128|(c&63));}}
    var l=b.length*8;b.push(0x80);while(b.length%64!==56)b.push(0);
    b.push(0,0,0,0);b.push((l>>>24)&0xff,(l>>>16)&0xff,(l>>>8)&0xff,l&0xff);
    for(var o=0;o<b.length;o+=64){
      var w=[];for(var t=0;t<16;t++)w[t]=(b[o+t*4]<<24)|(b[o+t*4+1]<<16)|(b[o+t*4+2]<<8)|b[o+t*4+3];
      for(t=16;t<64;t++){var s0=rr(w[t-15],7)^rr(w[t-15],18)^(w[t-15]>>>3);var s1=rr(w[t-2],17)^rr(w[t-2],19)^(w[t-2]>>>10);w[t]=(w[t-16]+s0+w[t-7]+s1)|0;}
      var a=H[0],bb=H[1],cc=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
      for(t=0;t<64;t++){var S1=rr(e,6)^rr(e,11)^rr(e,25);var ch=(e&f)^((~e)&g);var temp1=(h+S1+ch+K[t]+w[t])|0;var S0=rr(a,2)^rr(a,13)^rr(a,22);var maj=(a&bb)^(a&cc)^(bb&cc);var temp2=(S0+maj)|0;h=g;g=f;f=e;e=(d+temp1)|0;d=cc;cc=bb;bb=a;a=(temp1+temp2)|0;}
      H[0]=(H[0]+a)|0;H[1]=(H[1]+bb)|0;H[2]=(H[2]+cc)|0;H[3]=(H[3]+d)|0;H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
    }
    return H.map(function(v){return('00000000'+((v<0?v+4294967296:v).toString(16))).slice(-8);}).join('');
  }

  var ph='9d611a827549eda1396a927d18fb8d0c02dfd0a58e54d4a1a6e7c93f86aa3aee';


  document.addEventListener('DOMContentLoaded',function(){
    // Hide all real content
    Array.from(document.body.children).forEach(function(el){el.style.display='none';el.setAttribute('data-hidden','1');});

    var overlay=document.createElement('div');
    overlay.id='lockOverlay';
    overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0b;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:Inter,-apple-system,sans-serif;overflow:hidden;';

    var d=document.createElement('div');
    d.style.cssText='text-align:center;user-select:none;-webkit-user-select:none;';
    d.innerHTML='<div style="font-size:48px;margin-bottom:24px">⚡</div><h1 style="color:#ededef;font-size:22px;margin-bottom:32px;font-weight:600">Nik × Troy</h1><canvas id="patternCanvas" width="240" height="240" style="display:block;margin:0 auto;cursor:pointer;touch-action:none;"></canvas><p id="lockHint" style="color:#5c5c63;font-size:13px;margin-top:16px;">Draw pattern to unlock</p><p id="err" style="color:#ef4444;font-size:13px;margin-top:8px;opacity:0;transition:opacity 0.3s">Wrong pattern</p>';
    overlay.appendChild(d);
    document.body.appendChild(overlay);

    var canvas = document.getElementById('patternCanvas');
    var ctx = canvas.getContext('2d');
    var err = document.getElementById('err');
    var hint = document.getElementById('lockHint');

    var dotRadius = 12;
    var activeRadius = 16;
    var padding = 40;
    var spacing = (240 - padding * 2) / 2;
    var dots = [];
    for (var row = 0; row < 3; row++) {
      for (var col = 0; col < 3; col++) {
        dots.push({
          id: row * 3 + col + 1,
          x: padding + col * spacing,
          y: padding + row * spacing,
          selected: false
        });
      }
    }

    var selectedDots = [];
    var isDrawing = false;
    var currentX = 0, currentY = 0;
    var wrongFlash = false;

    function drawPattern() {
      ctx.clearRect(0, 0, 240, 240);
      if (selectedDots.length > 1) {
        ctx.beginPath();
        ctx.strokeStyle = wrongFlash ? '#ef4444' : '#6c5ce7';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.moveTo(dots[selectedDots[0] - 1].x, dots[selectedDots[0] - 1].y);
        for (var i = 1; i < selectedDots.length; i++) {
          ctx.lineTo(dots[selectedDots[i] - 1].x, dots[selectedDots[i] - 1].y);
        }
        ctx.stroke();
      }
      if (isDrawing && selectedDots.length > 0) {
        ctx.beginPath();
        ctx.strokeStyle = wrongFlash ? '#ef4444' : 'rgba(108,92,231,0.5)';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        var last = dots[selectedDots[selectedDots.length - 1] - 1];
        ctx.moveTo(last.x, last.y);
        ctx.lineTo(currentX, currentY);
        ctx.stroke();
      }
      for (var j = 0; j < dots.length; j++) {
        var dot = dots[j];
        var isSelected = selectedDots.indexOf(dot.id) !== -1;
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, isSelected ? activeRadius : dotRadius, 0, Math.PI * 2);
        if (wrongFlash) {
          ctx.fillStyle = isSelected ? 'rgba(239,68,68,0.2)' : 'rgba(239,68,68,0.08)';
        } else {
          ctx.fillStyle = isSelected ? 'rgba(108,92,231,0.2)' : 'rgba(255,255,255,0.05)';
        }
        ctx.fill();
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, isSelected ? 6 : 4, 0, Math.PI * 2);
        if (wrongFlash) {
          ctx.fillStyle = isSelected ? '#ef4444' : '#5c5c63';
        } else {
          ctx.fillStyle = isSelected ? '#6c5ce7' : '#5c5c63';
        }
        ctx.fill();
      }
    }

    function getCanvasPos(e) {
      var rect = canvas.getBoundingClientRect();
      var scaleX = 240 / rect.width;
      var scaleY = 240 / rect.height;
      var clientX, clientY;
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function hitTest(x, y) {
      for (var i = 0; i < dots.length; i++) {
        var dx = x - dots[i].x;
        var dy = y - dots[i].y;
        if (Math.sqrt(dx * dx + dy * dy) < 28) {
          return dots[i].id;
        }
      }
      return null;
    }

    function onStart(e) {
      e.preventDefault();
      if (wrongFlash) return;
      isDrawing = true;
      selectedDots = [];
      err.style.opacity = '0';
      var pos = getCanvasPos(e);
      currentX = pos.x;
      currentY = pos.y;
      var hit = hitTest(pos.x, pos.y);
      if (hit) selectedDots.push(hit);
      drawPattern();
    }

    function onMove(e) {
      e.preventDefault();
      if (!isDrawing) return;
      var pos = getCanvasPos(e);
      currentX = pos.x;
      currentY = pos.y;
      var hit = hitTest(pos.x, pos.y);
      if (hit && (selectedDots.length === 0 || selectedDots[selectedDots.length - 1] !== hit)) {
        selectedDots.push(hit);
      }
      drawPattern();
    }

    function onEnd(e) {
      e.preventDefault();
      if (!isDrawing) return;
      isDrawing = false;
      if (selectedDots.length < 2) {
        selectedDots = [];
        drawPattern();
        return;
      }
      var pattern = selectedDots.join('-');
      var hash = sha256(pattern);
      if (hash === ph) {
        document.getElementById('lockOverlay').remove();
        document.querySelectorAll('[data-hidden]').forEach(function(el){el.style.display='';el.removeAttribute('data-hidden');});
      } else {
        wrongFlash = true;
        err.style.opacity = '1';
        drawPattern();
        setTimeout(function() {
          wrongFlash = false;
          selectedDots = [];
          err.style.opacity = '0';
          drawPattern();
        }, 600);
      }
    }

    canvas.addEventListener('mousedown', onStart);
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseup', onEnd);
    canvas.addEventListener('mouseleave', onEnd);
    canvas.addEventListener('touchstart', onStart, { passive: false });
    canvas.addEventListener('touchmove', onMove, { passive: false });
    canvas.addEventListener('touchend', onEnd, { passive: false });
    canvas.addEventListener('touchcancel', onEnd, { passive: false });

    drawPattern();
  });
})();
</script>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0b;
    --surface: #141417;
    --surface-hover: #1a1a1f;
    --border: #232329;
    --border-subtle: #1c1c22;
    --text: #ededef;
    --text-secondary: #8b8b92;
    --text-tertiary: #5c5c63;
    --accent: #6c5ce7;
    --active: #10b981;
    --active-bg: rgba(16, 185, 129, 0.1);
    --paused: #6b7280;
    --paused-bg: rgba(107, 114, 128, 0.1);
    --waiting: #f59e0b;
    --waiting-bg: rgba(245, 158, 11, 0.1);
    --closed: #ef4444;
    --closed-bg: rgba(239, 68, 68, 0.1);
    --alert: #f43f5e;
    --alert-bg: rgba(244, 63, 94, 0.08);
    --alert-border: rgba(244, 63, 94, 0.25);
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* Header */
  header {
    padding: 48px 0 0;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .bolt {
    font-size: 24px;
    filter: saturate(1.2);
  }

  .project-count {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-tertiary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
  }

  /* Search & Filters */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .search-wrapper {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    font-size: 14px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input::placeholder { color: var(--text-tertiary); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
  }

  .filter-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

    padding: 8px 16px;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    user-select: none;
  }

  .pill:hover {
    border-color: var(--text-tertiary);
    color: var(--text);
  }

  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Needs Attention Banner */
  .attention-banner {
    margin-top: 20px;
    background: rgba(244, 63, 94, 0.06);
    border: 1px solid rgba(244, 63, 94, 0.2);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .attention-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .attention-header:hover {
    background: rgba(244, 63, 94, 0.04);
  }

  .attention-title {

    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--alert);

    letter-spacing: 0.5px;
  }

  .attention-count {

    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }

  .attention-toggle {

    font-size: 11px;

  .attention-banner.collapsed .attention-toggle {

  .attention-list {

  .attention-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: color 0.15s;
  }

  .attention-item:hover {

  .attention-item .att-icon {

  .attention-item .att-name {

    color: var(--text);
    margin-right: 4px;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1px;
    margin-top: 28px;
    background: var(--border-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  /* Card */
  .card {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    gap: 16px;
    padding: 18px 22px;
    background: var(--surface);
    transition: background 0.15s;
    cursor: default;
  }

  .card:hover { background: var(--surface-hover); }

  .card.has-alert {
    background: var(--alert-bg);
    border-left: 2px solid var(--alert);
    padding-left: 20px;
  }

  .card.has-alert:hover {
    background: rgba(244, 63, 94, 0.12);
  }

  .card-main {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.1px;
  }

  .status-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-active .status-dot { background: var(--active); }
  .status-active { color: var(--active); background: var(--active-bg); }

  .status-paused .status-dot { background: var(--paused); }
  .status-paused { color: var(--paused); background: var(--paused-bg); }

  .status-waiting .status-dot { background: var(--waiting); }
  .status-waiting { color: var(--waiting); background: var(--waiting-bg); }

  .status-closed .status-dot { background: var(--closed); }
  .status-closed { color: var(--closed); background: var(--closed-bg); }

  .card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-top: 2px;
  }

  .card-status-line {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 8px;
    font-size: 12.5px;
    color: #c8c8cc;
    line-height: 1.4;
  }

  .card-status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--active);
    flex-shrink: 0;
  }

  /* People Tags */
  .people-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .person-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    cursor: default;
    position: relative;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }

  .person-chip[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);

    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
    letter-spacing: 0;
  }

  .person-overflow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    font-size: 9px;
    font-weight: 600;

    background: var(--border);

  .decisions-section {
    margin-top: 8px;

  .decisions-toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    cursor: pointer;
    user-select: none;
    padding: 2px 0;
    transition: color 0.15s;

const statusPriority = { active: 1, waiting: 2, paused: 3, closed: 4 };

function sortProjects(list) {
  return [...list].sort((a, b) => {
    const aHas = a.alert ? 0 : 1;
    const bHas = b.alert ? 0 : 1;
    if (aHas !== bHas) return aHas - bHas;
    const aPri = statusPriority[a.status] || 5;
    const bPri = statusPriority[b.status] || 5;
    if (aPri !== bPri) return aPri - bPri;
    return a.name.localeCompare(b.name);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Generate consistent color from name string
function nameColor(name) {
  var hash = 0;
  for (var i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
    hash = hash & hash;
  }
  var hue = ((hash % 360) + 360) % 360;
  return 'hsl(' + hue + ', 55%, 45%)';
}

// Countdown helper
function getCountdown(dateStr) {
  var now = new Date();
  var target = new Date(dateStr + 'T00:00:00');
  var diff = target - now;
  var days = Math.ceil(diff / (1000 * 60 * 60 * 24));
  if (days < 0) return null;
  var label, cls;
  if (days > 30) {
    label = days > 42 ? Math.round(days / 7) + 'w' : days + 'd';
    cls = 'countdown-green';
  } else if (days >= 14) {
    label = days + 'd';
    cls = 'countdown-amber';
  } else {
    label = days + 'd';
    cls = 'countdown-red';
  }
  // progress: assume 90 day total window, cap at 1
  var progress = Math.min(1, Math.max(0, 1 - (days / 90)));
  var barColor = days > 30 ? '#10b981' : days >= 14 ? '#f59e0b' : '#ef4444';
  return { days: days, label: label, cls: cls, progress: progress, barColor: barColor };
}

// Build needs-attention items
function getAttentionItems() {
  var items = [];
  var now = new Date();
  projects.forEach(function(p) {
    if (p.alert) {
      items.push({ name: p.name, reason: p.alert, icon: '\u26A0\uFE0F' });
    }
    if (p.status === 'waiting' && p.updated) {
      var updated = new Date(p.updated + 'T00:00:00');
      var daysSince = Math.floor((now - updated) / (1000 * 60 * 60 * 24));
      if (daysSince > 3) {
        items.push({ name: p.name, reason: 'Waiting for ' + daysSince + ' days', icon: '\u23F3' });
      }
    }
    if (p.updated) {
      var updatedDate = new Date(p.updated + 'T00:00:00');
      var daysSinceUpdate = Math.floor((now - updatedDate) / (1000 * 60 * 60 * 24));
      if (daysSinceUpdate > 7 && p.status !== 'closed') {
        items.push({ name: p.name, reason: 'No activity in ' + daysSinceUpdate + ' days', icon: '\uD83D\uDCA4' });
      }
    }
  });
  return items;
}

function renderAttentionBanner() {
  var container = document.getElementById('attention-container');
  var items = getAttentionItems();
  if (items.length === 0) {
    container.innerHTML = '';
    return;
  }
  var itemsHtml = items.map(function(it) {
    return '<div class="attention-item" onclick="scrollToCard(\'' + escapeHtml(it.name.replace(/'/g, "\\'")) + '\')">' +
      '<span class="att-icon">' + it.icon + '</span>' +
      '<span><span class="att-name">' + escapeHtml(it.name) + '</span>' + escapeHtml(it.reason) + '</span>' +
      '</div>';
  }).join('');

  container.innerHTML =
    '<div class="attention-banner" id="attention-banner">' +
      '<div class="attention-header" onclick="toggleAttention()">' +
        '<div class="attention-title">\u26A0 Needs Attention <span class="attention-count">' + items.length + '</span></div>' +
        '<span class="attention-toggle">\u25BC</span>' +
      '</div>' +
      '<div class="attention-list">' + itemsHtml + '</div>' +
    '</div>';
}

function toggleAttention() {
  var banner = document.getElementById('attention-banner');
  if (banner) banner.classList.toggle('collapsed');
}

function scrollToCard(name) {
  var cards = document.querySelectorAll('.card');
  for (var i = 0; i < cards.length; i++) {
    var nameEl = cards[i].querySelector('.card-name');
    if (nameEl && nameEl.textContent === name) {
      cards[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
      cards[i].style.boxShadow = '0 0 0 2px var(--accent)';
      setTimeout(function(el) { el.style.boxShadow = ''; }.bind(null, cards[i]), 1500);
      break;
    }
  }
}

function renderPeople(people) {
  if (!people || people.length === 0) return '';
  var max = 5;
  var shown = people.slice(0, max);
  var overflow = people.length - max;
  var html = '<div class="people-row">';
  shown.forEach(function(p) {
    var color = nameColor(p.name);
    var tooltip = p.name + ' \u2014 ' + p.role;
    html += '<span class="person-chip" style="background:' + color + '" data-tooltip="' + escapeHtml(tooltip) + '">' + escapeHtml(p.initials) + '</span>';
  });
  if (overflow > 0) {
    html += '<span class="person-overflow">+' + overflow + '</span>';
  }
  html += '</div>';
  return html;
}

function renderEvents(events) {
  if (!events || events.length === 0) return '';
  var html = '<div class="events-section">';
  events.forEach(function(ev) {
    html += '<div class="event-item"><span class="event-icon">\uD83D\uDCC5</span><span class="event-date">' + escapeHtml(ev.date) + '</span><span class="event-text">' + escapeHtml(ev.event) + '</span></div>';
  });
  html += '</div>';
  return html;
}

function renderLinks(links) {
  if (!links || links.length === 0) return '';
  var html = '<div class="links-row">';
  links.forEach(function(lk) {
    var emoji = lk.emoji || '\uD83D\uDD17';
    html += '<a class="link-pill" href="' + escapeHtml(lk.url) + '" target="_blank" rel="noopener">' + emoji + ' ' + escapeHtml(lk.label) + '</a>';
  });
  html += '</div>';
  return html;
}

function renderDecisions(decisions, cardIdx) {
  if (!decisions || decisions.length === 0) return '';
  var id = 'decisions-' + cardIdx;
  var html = '<div class="decisions-section">';
  html += '<button class="decisions-toggle" onclick="toggleDecisions(\'' + id + '\', this)"><span class="toggle-arrow">\u25B6</span> Decisions (' + decisions.length + ')</button>';
  html += '<div class="decisions-list" id="' + id + '">';
  decisions.forEach(function(d) {
    html += '<div class="decision-item"><span class="decision-date">' + escapeHtml(d.date) + '</span><span class="decision-text">' + escapeHtml(d.text) + '</span></div>';
  });
  html += '</div></div>';
  return html;
}

function toggleDecisions(id, btn) {
  var list = document.getElementById(id);
  if (!list) return;
  list.classList.toggle('visible');
  btn.classList.toggle('expanded');
}

function renderCountdown(countdown) {
  if (!countdown) return '';
  var info = getCountdown(countdown.date);
  if (!info) return '';
  var html = '<div class="countdown-badge">';
  html += '<span class="countdown-label">' + escapeHtml(countdown.label) + '</span>';
  html += '<span class="countdown-value ' + info.cls + '">' + info.label + '</span>';
  html += '<div class="countdown-bar"><div class="countdown-bar-fill" style="width:' + Math.round(info.progress * 100) + '%;background:' + info.barColor + '"></div></div>';
  html += '</div>';
  return html;
}

function renderCard(p, i) {
  const hasAlert = p.alert ? 'has-alert' : '';
  const date = new Date(p.updated + 'T00:00:00');
  const formatted = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const alertHtml = p.alert
    ? '<div class="alert-badge"><span class="alert-icon">\u26A0</span> ' + escapeHtml(p.alert) + '</div>'
    : '';

  let statusLineHtml = '';
  if (p.currentStatus) {
    statusLineHtml = '<div class="card-status-line"><span class="card-status-dot"></span>' + escapeHtml(p.currentStatus) + '</div>';
  }

  let activityHtml = '';
  if (p.recentActivity && p.recentActivity.length > 0) {
    const items = p.recentActivity.map(function(a) {
      return '<div class="card-activity-item"><span class="activity-date">' + escapeHtml(a.date) + '</span><span class="activity-text">' + escapeHtml(a.text) + '</span></div>';
    }).join('');
    activityHtml = '<div class="card-activity">' + items + '</div>';
  }

  var peopleHtml = renderPeople(p.people);
  var eventsHtml = renderEvents(p.upcomingEvents);
  var linksHtml = renderLinks(p.links);
  var decisionsHtml = renderDecisions(p.decisions, i);
  var countdownHtml = renderCountdown(p.countdown);

  return '<div class="card ' + hasAlert + '" style="animation-delay: ' + (i * 30) + 'ms">' +
    '<div class="card-main">' +
      '<div class="card-header">' +
        '<span class="card-name">' + escapeHtml(p.name) + '</span>' +
        '<span class="status-tag status-' + p.status + '"><span class="status-dot"></span>' + p.status + '</span>' +
      '</div>' +
      '<div class="card-desc">' + escapeHtml(p.desc) + '</div>' +
      peopleHtml +
      statusLineHtml +
      eventsHtml +
      linksHtml +
      activityHtml +
      alertHtml +
      decisionsHtml +
    '</div>' +
    '<div class="card-meta">' +
      '<span class="card-date">' + formatted + '</span>' +
      countdownHtml +
    '</div>' +
  '</div>';
}

let currentFilter = 'all';
let searchQuery = '';

function render() {
  let filtered = projects;

  if (currentFilter !== 'all') {
    filtered = filtered.filter(function(p) { return p.status === currentFilter; });
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(function(p) {
      return p.name.toLowerCase().includes(q) ||
        p.desc.toLowerCase().includes(q) ||
        p.status.toLowerCase().includes(q) ||
        (p.alert && p.alert.toLowerCase().includes(q)) ||
        (p.currentStatus && p.currentStatus.toLowerCase().includes(q)) ||
        (p.recentActivity && p.recentActivity.some(function(a) { return a.text.toLowerCase().includes(q); })) ||
        (p.people && p.people.some(function(pe) { return pe.name.toLowerCase().includes(q) || pe.role.toLowerCase().includes(q); })) ||
        (p.upcomingEvents && p.upcomingEvents.some(function(ev) { return ev.event.toLowerCase().includes(q) || ev.date.toLowerCase().includes(q); }));
    });
  }

  const sorted = sortProjects(filtered);
  const grid = document.getElementById('grid');

  if (sorted.length === 0) {
    grid.innerHTML = '<div class="empty">No projects match your filters.</div>';
  } else {
    grid.innerHTML = sorted.map(function(p, i) { return renderCard(p, i); }).join('');
  }

  document.getElementById('count').textContent = sorted.length + ' of ' + projects.length + ' projects';
}

// Filters
document.getElementById('filters').addEventListener('click', function(e) {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  document.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
  pill.classList.add('active');
  currentFilter = pill.dataset.filter;
  render();
});

// Search
document.getElementById('search').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  render();
});

// Timestamp
const now = new Date();
document.getElementById('timestamp').textContent = now.toLocaleDateString('en-US', {
  weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
  hour: 'numeric', minute: '2-digit', hour12: true
});

// Initial render
renderAttentionBanner();
render();

// Auto-refresh every 2 hours
setInterval(function() { location.reload(); }, 2 * 60 * 60 * 1000);
