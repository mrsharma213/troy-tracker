<head>

<script>
(function(){
  // Minimal SHA-256 (works without HTTPS/crypto.subtle)
  function sha256(s){
    function rr(n,x){return(n>>>x)|(n<<(32-x));}
    var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
      0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
      0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
      0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
      0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
      0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
      0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
      0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
    var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    var b=[];for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);if(c<128)b.push(c);else if(c<2048){b.push(192|(c>>6));b.push(128|(c&63));}else{b.push(224|(c>>12));b.push(128|((c>>6)&63));b.push(128|(c&63));}}
    var l=b.length*8;b.push(0x80);while(b.length%64!==56)b.push(0);
    b.push(0,0,0,0);b.push((l>>>24)&0xff,(l>>>16)&0xff,(l>>>8)&0xff,l&0xff);
    for(var o=0;o<b.length;o+=64){
      var w=[];for(var t=0;t<16;t++)w[t]=(b[o+t*4]<<24)|(b[o+t*4+1]<<16)|(b[o+t*4+2]<<8)|b[o+t*4+3];
      for(t=16;t<64;t++){var s0=rr(w[t-15],7)^rr(w[t-15],18)^(w[t-15]>>>3);var s1=rr(w[t-2],17)^rr(w[t-2],19)^(w[t-2]>>>10);w[t]=(w[t-16]+s0+w[t-7]+s1)|0;}
      var a=H[0],bb=H[1],cc=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
      for(t=0;t<64;t++){var S1=rr(e,6)^rr(e,11)^rr(e,25);var ch=(e&f)^((~e)&g);var temp1=(h+S1+ch+K[t]+w[t])|0;var S0=rr(a,2)^rr(a,13)^rr(a,22);var maj=(a&bb)^(a&cc)^(bb&cc);var temp2=(S0+maj)|0;h=g;g=f;f=e;e=(d+temp1)|0;d=cc;cc=bb;bb=a;a=(temp1+temp2)|0;}
      H[0]=(H[0]+a)|0;H[1]=(H[1]+bb)|0;H[2]=(H[2]+cc)|0;H[3]=(H[3]+d)|0;H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
    }
    return H.map(function(v){return('00000000'+((v<0?v+4294967296:v).toString(16))).slice(-8);}).join('');
  }
  var ph='48c6c89b82643c1f7be13312f7f7d68db10c68c48167459e5162ac4c0584c897';
  if(sessionStorage.getItem('cc_auth')==='1')return;
  document.addEventListener('DOMContentLoaded',function(){
    document.body.innerHTML='';
    document.body.style.cssText='background:#0a0a0b;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:Inter,-apple-system,sans-serif;';
    var d=document.createElement('div');
    d.style.cssText='text-align:center;';
    d.innerHTML='<div style="font-size:48px;margin-bottom:24px">⚡</div><h1 style="color:#ededef;font-size:22px;margin-bottom:24px;font-weight:600">Nik × Troy</h1><form id="pf" style="margin:0"><input id="pw" type="password" placeholder="Password" style="padding:12px 18px;width:240px;background:#141417;border:1px solid #232329;border-radius:10px;color:#ededef;font-size:14px;font-family:inherit;outline:none;text-align:center" autofocus><br><button type="submit" style="margin-top:16px;padding:10px 32px;background:#6c5ce7;border:none;border-radius:10px;color:#fff;font-size:14px;font-family:inherit;font-weight:500;cursor:pointer">Enter</button></form><p id="err" style="color:#ef4444;font-size:13px;margin-top:12px;opacity:0">Wrong password</p>';
    document.body.appendChild(d);
    var pw=document.getElementById('pw');
    var err=document.getElementById('err');
    document.getElementById('pf').addEventListener('submit',function(e){
      e.preventDefault();
      var v=sha256(pw.value);
      if(v===ph){sessionStorage.setItem('cc_auth','1');location.reload();}
      else{err.style.opacity='1';pw.value='';pw.style.borderColor='#ef4444';}
    });
  });
})();
</script>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0b;
    --surface: #141417;
    --surface-hover: #1a1a1f;
    --border: #232329;
    --border-subtle: #1c1c22;
    --text: #ededef;
    --text-secondary: #8b8b92;
    --text-tertiary: #5c5c63;
    --accent: #6c5ce7;
    --active: #10b981;
    --active-bg: rgba(16, 185, 129, 0.1);
    --paused: #6b7280;
    --paused-bg: rgba(107, 114, 128, 0.1);
    --waiting: #f59e0b;
    --waiting-bg: rgba(245, 158, 11, 0.1);
    --closed: #ef4444;
    --closed-bg: rgba(239, 68, 68, 0.1);
    --alert: #f43f5e;
    --alert-bg: rgba(244, 63, 94, 0.08);
    --alert-border: rgba(244, 63, 94, 0.25);
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* Header */
  header {
    padding: 48px 0 0;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .bolt {
    font-size: 24px;
    filter: saturate(1.2);
  }

  .project-count {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-tertiary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
  }

  /* Search & Filters */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .search-wrapper {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    font-size: 14px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input::placeholder { color: var(--text-tertiary); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
  }

  .filter-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    user-select: none;
  }

  .pill:hover {
    border-color: var(--text-tertiary);
    color: var(--text);
  }

  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1px;
    margin-top: 28px;
    background: var(--border-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  /* Card */
  .card {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    gap: 16px;
    padding: 18px 22px;
    background: var(--surface);
    transition: background 0.15s;
    cursor: default;
  }

  .card:hover { background: var(--surface-hover); }

  .card.has-alert {
    background: var(--alert-bg);
    border-left: 2px solid var(--alert);
    padding-left: 20px;
  }

  .card.has-alert:hover {
    background: rgba(244, 63, 94, 0.12);
  }

  .card-main {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.1px;
  }

  .status-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-active .status-dot { background: var(--active); }
  .status-active { color: var(--active); background: var(--active-bg); }

  .status-paused .status-dot { background: var(--paused); }
  .status-paused { color: var(--paused); background: var(--paused-bg); }

  .status-waiting .status-dot { background: var(--waiting); }
  .status-waiting { color: var(--waiting); background: var(--waiting-bg); }

  .status-closed .status-dot { background: var(--closed); }
  .status-closed { color: var(--closed); background: var(--closed-bg); }

  .card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-top: 2px;
  }

  .alert-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--alert);
    background: rgba(244, 63, 94, 0.1);
    border: 1px solid var(--alert-border);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
  }

  .alert-icon { font-size: 12px; }

  .card-meta {
    text-align: right;
    white-space: nowrap;
    padding-top: 2px;
  }

  .card-date {
    font-size: 12px;
    color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
  }

  /* Empty State */
  .empty {
    text-align: center;
    padding: 64px 24px;
    color: var(--text-tertiary);
    font-size: 14px;
    background: var(--surface);
  }

  /* Footer */
  footer {
    padding: 40px 0 48px;
    text-align: center;
  }

  .footer-text {
    font-size: 12px;
    color: var(--text-tertiary);
  }

  .footer-text span {
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* Responsive */
  @media (max-width: 640px) {
    header { padding: 32px 0 0; }
    h1 { font-size: 22px; }
    .controls { flex-direction: column; align-items: stretch; }
    .search-wrapper { max-width: none; }
    .filter-pills { justify-content: flex-start; }
    .card { grid-template-columns: 1fr; gap: 10px; padding: 16px 18px; }
    .card-meta { text-align: left; }
  }

  /* Fade-in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    animation: fadeUp 0.3s ease both;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-row">
      <div class="header-title">
        <h1>Nik × Troy</h1>
        <span class="bolt">⚡</span>
      </div>
      <div class="project-count" id="count"></div>
    </div>
    <div class="controls">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search" placeholder="Search projects..." autocomplete="off">
      </div>
      <div class="filter-pills" id="filters">
        <button class="pill active" data-filter="all">All</button>
        <button class="pill" data-filter="active">Active</button>
        <button class="pill" data-filter="waiting">Waiting</button>
        <button class="pill" data-filter="paused">Paused</button>
        <button class="pill" data-filter="closed">Closed</button>
      </div>
    </div>
  </header>

  <div class="grid" id="grid"></div>
</div>

<footer>
  <div class="container">
    <p class="footer-text">Last updated <span id="timestamp"></span></p>
  </div>
</footer>

<script>
const projects = [
  {
    name: "Zurp LLC",
    desc: "Power bank rental for NYC nightclubs. 6 stations, 24 banks each. Partners: Troy, Dil, Jimmy. Stripe payments, custom app. CURRENT: Meeting with Nikki Sanders at Gospel NYC to discuss station placement. NEXT: Finalize venue contracts, deploy first stations.",
    status: "active",
    updated: "2026-03-14",
    alert: "ZURP × Gospel meeting Sat 3/14 4–5pm"
  },
  {
    name: "Rolling Ventures",
    desc: "Boutique venture fund — consumer/tech/culture investing. CURRENT: Evaluating deal flow. Recent PEF deal: Multi-Family REIT Fund (25.2% IRR, 2.42x equity multiple). NEXT: Rolling Ventures TB call this week.",
    status: "active",
    updated: "2026-03-14"
  },
  {
    name: "After Ours / Pigeon House Records",
    desc: "Tech house/dark house with Minul. Label: Pigeon House Records. CURRENT: \"My Mind\" just went live today (3/14). NEXT: Promote release, plan next track.",
    status: "active",
    updated: "2026-03-14"
  },
  {
    name: "Chef Trey",
    desc: "Private chef, comes weekly on Wednesdays. CURRENT: Regular weekly schedule locked in. NEXT: Wednesday 3/18 — confirm menu/headcount.",
    status: "active",
    updated: "2026-03-14"
  },
  {
    name: "Macra",
    desc: "Own supplement brand, pre-launch. HP-719 (mood booster: saffron, rhodiola, L-theanine) and CB-628 (carb blocker: white kidney bean, green tea, chromium). CURRENT: Melcorp sent updated tin sample CAD — awaiting confirmation on embossed logo mould ($400 sample fee, 14-18 day lead). NEXT: Approve mould, finalize packaging, build out site and email flows.",
    status: "active",
    updated: "2026-03-14"
  },
  {
    name: "Kids Vitamin Brand",
    desc: "Early-stage, self-funded. ~4 month launch timeline. CURRENT: Concept and formulation phase. NEXT: Finalize product formulation, begin brand identity work.",
    status: "active",
    updated: "2026-03-14"
  }
];

const statusPriority = { active: 1, waiting: 2, paused: 3, closed: 4 };

function sortProjects(list) {
  return [...list].sort((a, b) => {
    const aHas = a.alert ? 0 : 1;
    const bHas = b.alert ? 0 : 1;
    if (aHas !== bHas) return aHas - bHas;
    const aPri = statusPriority[a.status] || 5;
    const bPri = statusPriority[b.status] || 5;
    if (aPri !== bPri) return aPri - bPri;
    return a.name.localeCompare(b.name);
  });
}

function renderCard(p, i) {
  const hasAlert = p.alert ? 'has-alert' : '';
  const date = new Date(p.updated + 'T00:00:00');
  const formatted = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const alertHtml = p.alert
    ? `<div class="alert-badge"><span class="alert-icon">⚠</span> ${p.alert}</div>`
    : '';

  return `
    <div class="card ${hasAlert}" style="animation-delay: ${i * 30}ms">
      <div class="card-main">
        <div class="card-header">
          <span class="card-name">${p.name}</span>
          <span class="status-tag status-${p.status}"><span class="status-dot"></span>${p.status}</span>
        </div>
        <div class="card-desc">${p.desc}</div>
        ${alertHtml}
      </div>
      <div class="card-meta">
        <span class="card-date">${formatted}</span>
      </div>
    </div>`;
}

let currentFilter = 'all';
let searchQuery = '';

function render() {
  let filtered = projects;

  if (currentFilter !== 'all') {
    filtered = filtered.filter(p => p.status === currentFilter);
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      p.status.toLowerCase().includes(q) ||
      (p.alert && p.alert.toLowerCase().includes(q))
    );
  }

  const sorted = sortProjects(filtered);
  const grid = document.getElementById('grid');

  if (sorted.length === 0) {
    grid.innerHTML = '<div class="empty">No projects match your filters.</div>';
  } else {
    grid.innerHTML = sorted.map((p, i) => renderCard(p, i)).join('');
  }

  document.getElementById('count').textContent = `${sorted.length} of ${projects.length} projects`;
}

// Filters
document.getElementById('filters').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  currentFilter = pill.dataset.filter;
  render();
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// Timestamp
const now = new Date();
document.getElementById('timestamp').textContent = now.toLocaleDateString('en-US', {
  weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
  hour: 'numeric', minute: '2-digit', hour12: true
});

// Initial render
render();
</script>
</body>
</html>
